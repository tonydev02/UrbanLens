name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy --component rustfmt

      - name: Run Rust checks
        run: bash scripts/check-rust.sh

  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install web dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run web checks
        run: bash scripts/check-web.sh

      - name: Build web app
        run: corepack pnpm --filter @urbanlens/web build

  compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run Compose smoke validation
        env:
          COMPOSE_PROJECT_NAME: urbanlens_ci
        run: bash scripts/smoke-compose.sh

      - name: Dump logs on failure
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: urbanlens_ci
        run: docker compose logs --no-color

      - name: Tear down Compose stack
        if: always()
        env:
          COMPOSE_PROJECT_NAME: urbanlens_ci
        run: docker compose down --volumes --remove-orphans
