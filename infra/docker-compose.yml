services:
  postgres:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-urbanlens}
      POSTGRES_USER: ${POSTGRES_USER:-urbanlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urbanlens_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  migrate:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    command: ["urbanlens-migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://urbanlens:urbanlens_dev@postgres:5432/urbanlens}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      API_DATABASE_MAX_CONNECTIONS: ${API_DATABASE_MAX_CONNECTIONS:-5}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://urbanlens:urbanlens_dev@postgres:5432/urbanlens}
      RUST_LOG: ${RUST_LOG:-info,urbanlens_api=debug}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "urbanlens-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres-data:
