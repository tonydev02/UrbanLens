services:
  postgres:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-urbanlens}
      POSTGRES_USER: ${POSTGRES_USER:-urbanlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-urbanlens_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  migrate:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    command: ["urbanlens-migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://urbanlens:urbanlens_dev@postgres:5432/urbanlens}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres-data:
